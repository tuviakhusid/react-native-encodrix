query GetProcessedDocuments(
  $status: StringFilter
  $stageStatus: StringFilter
  $query: String
  $fromDate: String
  $filterByDate: String = "processing_date"
  $toDate: String
  $tags: [String!]
) {
  documentsByStatus(
    filterByDate: $filterByDate
    status: $status
    stageStatus: $stageStatus
    q: $query
    fromDate: $fromDate
    toDate: $toDate
    tags: $tags
  ) {
    documents {
      id
      extraData
      googleDriveUrl
      googleDriveUploaded
      currentStageName
      currentStageType
      folderId
      createdAt
      invoiceDataId
      s3Urls
      updatedAt
      workflowStatus
      documentName
      fileFormat
      businessName
      orgName
      clientName
      documentType
      documentHighLevelType
      workflowName
      documentHighLevelType
      workflowDocumentInstanceId
      commentCount
      uploadedByDetails
      currentStageType
      issueDate
      tags
      isMappingConfirmed
      nextStage
      workflowStatus
      wfStageStatus
      documentStatus
      amount
      invoiceNumber
      reconciled
    }
    noWorkflowCount
    totalDocuments
    inProgressCount
    completedCount
    onHoldCount
    pendingCount
    stageCount
    rejectedCount
    totalPages
    totalAmount
  }
}
